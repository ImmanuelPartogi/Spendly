name: spendly
description: Personal finance tracker — smart, fast, and beautiful.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  cupertino_icons: ^1.0.8

  # Image
  image_picker: ^1.1.2

  # Export
  pdf: ^3.11.1
  printing: ^5.12.0
  csv: ^6.0.0
  share_plus: ^12.0.2

  # OCR Scanner
  google_mlkit_text_recognition: ^0.13.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # ── Firebase (versi harus saling kompatibel satu FlutterFire release) ──────
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  connectivity_plus: ^6.0.5

  # Homescreen Widget
  home_widget: ^0.6.0

  # Coach Mark / Tour
  tutorial_coach_mark: ^1.2.11

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5

  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

# ─────────────────────────────────────────────────────────────────────────────
# Dev Dependencies
# ─────────────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_native_splash: ^2.4.0

# ─────────────────────────────────────────────────────────────────────────────
# Flutter
# ─────────────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # - assets/icons/

  # Fonts tersedia via google_fonts — tidak perlu bundle manual

# ─────────────────────────────────────────────────────────────────────────────
# Splash Screen  ← TAMBAH DI SINI, LUAR BLOK flutter:
# ─────────────────────────────────────────────────────────────────────────────
flutter_native_splash:
  # ── Light Mode ──────────────────────────────────────────
  color: "#FFFFFF"
  image: assets/images/logo.png
  fullscreen: true
  android_gravity: center

  # ── Dark Mode ───────────────────────────────────────────
  color_dark: "#121212"
  image_dark: assets/images/logo.png

  # ── Android 12+ ─────────────────────────────────────────
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo.png
    icon_background_color: "#FFFFFF"

    color_dark: "#121212"
    image_dark: assets/images/logo.png
    icon_background_color_dark: "#121212"